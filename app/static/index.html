<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 2rem;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h2 { margin-bottom: 16px; color: #2c3e50; font-size: 1.1rem; }
    input, textarea, select {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    textarea { resize: vertical; height: 80px; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #3498db; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-success { background: #2ecc71; color: white; }
    .task {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid #3498db;
    }
    .task.done { border-left-color: #2ecc71; }
    .task h3 { margin-bottom: 4px; font-size: 1rem; }
    .task p { font-size: 0.88rem; color: #666; margin-bottom: 8px; }
    .task-meta {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 10px;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .badge.todo { background: #ffeaa7; color: #d4a017; }
    .badge.done { background: #d5f5e3; color: #1e8449; }
    .task-actions { display: flex; gap: 8px; }
    #message {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      font-weight: 600;
    }
    #message.success { background: #d5f5e3; color: #1e8449; display: block; }
    #message.error { background: #fadbd8; color: #922b21; display: block; }
    #tasks-list p { text-align: center; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Task Manager</h1>

    <div id="message"></div>

    <!-- Create Task -->
    <div class="card">
      <h2>➕ Create New Task</h2>
      <input type="text" id="title" placeholder="Task title" />
      <textarea id="description" placeholder="Description (optional)"></textarea>
      <select id="status">
        <option value="todo">To Do</option>
        <option value="done">Done</option>
      </select>
      <button class="btn-primary" onclick="createTask()">Create Task</button>
    </div>

    <!-- Task List -->
    <div class="card">
      <h2>📋 All Tasks</h2>
      <div id="tasks-list">Loading...</div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
    <div style="background:white; border-radius:12px; padding:28px; width:90%; max-width:480px;">
      <h2 style="margin-bottom:16px;">✏️ Edit Task</h2>
      <input type="hidden" id="edit-id" />
      <input type="text" id="edit-title" placeholder="Title" />
      <textarea id="edit-description" placeholder="Description"></textarea>
      <select id="edit-status">
        <option value="todo">To Do</option>
        <option value="done">Done</option>
      </select>
      <div style="display:flex; gap:10px; margin-top:4px;">
        <button class="btn-success" onclick="saveEdit()">Save Changes</button>
        <button onclick="closeModal()" style="background:#eee; color:#333;">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://127.0.0.1:8000'
      : 'https://task-manager-api-32z1.onrender.com';

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = type;
      setTimeout(() => el.className = '', 3000);
    }

    async function loadTasks() {
      const res = await fetch(`${API}/tasks`);
      const tasks = await res.json();
      const container = document.getElementById('tasks-list');
      if (tasks.length === 0) {
        container.innerHTML = '<p>No tasks yet. Create one above!</p>';
        return;
      }
      container.innerHTML = tasks.map(task => `
        <div class="task ${task.status}">
          <span class="badge ${task.status}">${task.status === 'todo' ? 'To Do' : 'Done'}</span>
          <h3>${task.title}</h3>
          <p>${task.description || 'No description'}</p>
          <div class="task-meta">Created: ${new Date(task.created_at).toLocaleString()}</div>
          <div class="task-actions">
            <button class="btn-primary" onclick="openEdit(${task.id}, '${task.title}', '${task.description || ''}', '${task.status}')">Edit</button>
            <button class="btn-danger" onclick="deleteTask(${task.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function createTask() {
      const title = document.getElementById('title').value.trim();
      if (!title) { showMessage('Title is required!', 'error'); return; }
      await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title,
          description: document.getElementById('description').value,
          status: document.getElementById('status').value
        })
      });
      document.getElementById('title').value = '';
      document.getElementById('description').value = '';
      showMessage('Task created!', 'success');
      loadTasks();
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      showMessage('Task deleted!', 'success');
      loadTasks();
    }

    function openEdit(id, title, description, status) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-title').value = title;
      document.getElementById('edit-description').value = description;
      document.getElementById('edit-status').value = status;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function saveEdit() {
      const id = document.getElementById('edit-id').value;
      await fetch(`${API}/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: document.getElementById('edit-title').value,
          description: document.getElementById('edit-description').value,
          status: document.getElementById('edit-status').value
        })
      });
      closeModal();
      showMessage('Task updated!', 'success');
      loadTasks();
    }

    loadTasks();
  </script>
</body>
</html>
